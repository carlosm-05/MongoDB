<!DOCTYPE html>
<html>
<head>
  <title>Productos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    input {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 8px 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .actions button {
      margin-left: 5px;
    }
  </style>
</head>
<body>

<h1>Gestión de Productos</h1>

<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="category" placeholder="Categoría">
<button onclick="saveProduct()">Guardar</button>

<ul id="list"></ul>

<script>
const API = window.location.origin;

let editId = null;

async function loadProducts(){
  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();

    if (!Array.isArray(data)) {
      console.error("Respuesta inválida:", data);
      return;
    }

    const list = document.getElementById('list');
    list.innerHTML = "";

    data.forEach(p => {
      list.innerHTML += `
        <li>
          <span>${p.name} - $${p.price} (${p.category})</span>
          <div class="actions">
            <button onclick="editProduct('${p._id}', '${p.name}', '${p.price}', '${p.category}')">Editar</button>
            <button onclick="deleteProduct('${p._id}')">Eliminar</button>
          </div>
        </li>
      `;
    });

  } catch (error) {
    console.error("Error cargando productos:", error);
  }
}

async function saveProduct(){
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const category = document.getElementById('category').value;

  if (editId) {
    await fetch(`${API}/products/${editId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price, category })
    });
    editId = null;
  } else {
    await fetch(`${API}/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price, category })
    });
  }

  clearForm();
  loadProducts();
}

function editProduct(id, name, price, category){
  document.getElementById('name').value = name;
  document.getElementById('price').value = price;
  document.getElementById('category').value = category;
  editId = id;
}

async function deleteProduct(id){
  await fetch(`${API}/products/${id}`, {
    method: 'DELETE'
  });

  loadProducts();
}

function clearForm(){
  document.getElementById('name').value = "";
  document.getElementById('price').value = "";
  document.getElementById('category').value = "";
}

loadProducts();
</script>

</body>
</html>
