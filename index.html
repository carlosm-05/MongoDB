<!DOCTYPE html>
<html>
<head>
  <title>Productos</title>
</head>
<body>

<h1>Gestión de Productos</h1>

<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="category" placeholder="Categoría">
<button onclick="saveProduct()">Guardar</button>

<ul id="list"></ul>

<script>
const API = window.location.origin;

let editId = null;

// Cargar productos
async function loadProducts(){
  const res = await fetch(`${API}/products`);
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <li>
        ${p.name} - $${p.price} (${p.category})
        <button onclick="editProduct('${p._id}', '${p.name}', '${p.price}', '${p.category}')">Editar</button>
        <button onclick="deleteProduct('${p._id}')">Eliminar</button>
      </li>
    `;
  });
}

// Crear o actualizar
async function saveProduct(){
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const category = document.getElementById('category').value;

  if (editId) {
    await fetch(`${API}/products/${editId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price, category })
    });
    editId = null;
  } else {
    await fetch(`${API}/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price, category })
    });
  }

  clearForm();
  loadProducts();
}

// Editar
function editProduct(id, name, price, category){
  document.getElementById('name').value = name;
  document.getElementById('price').value = price;
  document.getElementById('category').value = category;
  editId = id;
}

// Eliminar
async function deleteProduct(id){
  await fetch(`${API}/products/${id}`, {
    method: 'DELETE'
  });
  loadProducts();
}

// Limpiar
function clearForm(){
  document.getElementById('name').value = "";
  document.getElementById('price').value = "";
  document.getElementById('category').value = "";
}

// Inicial
loadProducts();
</script>

</body>
</html>
